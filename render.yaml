services:
  - type: web
    name: truthlens-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.5
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: truthlens
      - key: EMERGENT_LLM_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: MONGO_SERVER_SELECTION_TIMEOUT_MS
        value: "5000"
      - key: MONGO_SOCKET_TIMEOUT_MS
        value: "10000"

  - type: web
    name: truthlens-web
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_BACKEND_URL
        value: https://truthlens-ai-s5h0.onrender.com
