services:
  - type: web
    name: truthlens-ai-backend
    env: python
    region: oregon
    plan: free
    buildCommand: "pip install --upgrade pip && pip install -r backend/requirements.txt && pip install gunicorn"
    startCommand: "cd backend && gunicorn -w 4 -b 0.0.0.0:$PORT server:app"
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.7
      - key: ENVIRONMENT
        value: production
